asyncapi: 3.0.0
info:
  title: VieGo Domain Events
  version: 1.0.0
  description: >
    Asynchronous domain events published between Spring Modulith modules via the transactional
    event-publication log. On service extraction these become broker topics (Kafka/AMQP) with
    no change to publishers. Source of truth for the event catalog.

    BeatCaptured is the backbone event: one capture fans out to exploration (unlock), engagement
    (streak), and social (feeds).

    notification is the downstream sink: it consumes MilestoneReached, ProvinceUnlocked,
    FriendAdded, and BeatReacted, then publishes NotificationRaised for delivery channels. No
    module consumes notification's events except a push/email adapter.
defaultContentType: application/json
channels:
  explorerRegistered:
    address: viego.identity.explorer-registered
    messages:
      ExplorerRegistered:
        $ref: '#/components/messages/ExplorerRegistered'
  preferencesUpdated:
    address: viego.identity.preferences-updated
    messages:
      PreferencesUpdated:
        $ref: '#/components/messages/PreferencesUpdated'
  beatCaptured:
    address: viego.content.beat-captured
    messages:
      BeatCaptured:
        $ref: '#/components/messages/BeatCaptured'
  provinceUnlocked:
    address: viego.exploration.province-unlocked
    messages:
      ProvinceUnlocked:
        $ref: '#/components/messages/ProvinceUnlocked'
  streakAdvanced:
    address: viego.engagement.streak-advanced
    messages:
      StreakAdvanced:
        $ref: '#/components/messages/StreakAdvanced'
  streakBroken:
    address: viego.engagement.streak-broken
    messages:
      StreakBroken:
        $ref: '#/components/messages/StreakBroken'
  milestoneReached:
    address: viego.engagement.milestone-reached
    messages:
      MilestoneReached:
        $ref: '#/components/messages/MilestoneReached'
  friendAdded:
    address: viego.social.friend-added
    messages:
      FriendAdded:
        $ref: '#/components/messages/FriendAdded'
  beatReacted:
    address: viego.social.beat-reacted
    messages:
      BeatReacted:
        $ref: '#/components/messages/BeatReacted'
  notificationRaised:
    address: viego.notification.notification-raised
    messages:
      NotificationRaised:
        $ref: '#/components/messages/NotificationRaised'
operations:
  publishBeatCaptured:
    action: send
    channel:
      $ref: '#/channels/beatCaptured'
    summary: content publishes when an Explorer captures a Beat (the backbone event)
  onBeatCaptured:
    action: receive
    channel:
      $ref: '#/channels/beatCaptured'
    summary: >
      exploration (unlock the province of the first Beat), engagement (advance the daily streak),
      and social (fan out to friend feeds / discover) all consume this
  publishProvinceUnlocked:
    action: send
    channel:
      $ref: '#/channels/provinceUnlocked'
    summary: exploration publishes when a province is unlocked
  onProvinceUnlocked:
    action: receive
    channel:
      $ref: '#/channels/provinceUnlocked'
    summary: engagement consumes this for province-milestone surfaces; notification records a PROVINCE_UNLOCKED
  onMilestoneReached:
    action: receive
    channel:
      $ref: '#/channels/milestoneReached'
    summary: notification records a MILESTONE_REACHED; social surfaces the badge
  onFriendAdded:
    action: receive
    channel:
      $ref: '#/channels/friendAdded'
    summary: notification records a FRIEND_ADDED
  onBeatReacted:
    action: receive
    channel:
      $ref: '#/channels/beatReacted'
    summary: notification records a BEAT_REACTED for the Beat's author
  publishNotificationRaised:
    action: send
    channel:
      $ref: '#/channels/notificationRaised'
    summary: notification publishes when a notification is recorded, for out-of-app delivery channels
  onNotificationRaised:
    action: receive
    channel:
      $ref: '#/channels/notificationRaised'
    summary: a push/email delivery adapter consumes this; no domain module depends on notification
components:
  messages:
    ExplorerRegistered:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          handle: { type: string }
          at: { type: string, format: date-time }
    PreferencesUpdated:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          language: { type: string, enum: [vi, en, ko, ja, fr] }
          theme: { type: string, enum: [light, dark] }
    BeatCaptured:
      payload:
        type: object
        properties:
          beatId: { type: string }
          explorerId: { type: string }
          provinceId: { type: string }
          placeId: { type: string, nullable: true }
          audience: { type: string, enum: [friends, public] }
          recipients:
            type: array
            items: { type: string, description: 'friend id; present when audience=friends' }
          at: { type: string, format: date-time }
    ProvinceUnlocked:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          provinceId: { type: string }
          at: { type: string, format: date-time }
    StreakAdvanced:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          newCount: { type: integer }
          at: { type: string, format: date-time }
    StreakBroken:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          previousCount: { type: integer }
          at: { type: string, format: date-time }
    MilestoneReached:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          milestone: { type: integer, description: 'streak length reached, e.g. 7' }
          badge: { type: string, example: 'Tuần Rực Lửa' }
          at: { type: string, format: date-time }
    FriendAdded:
      payload:
        type: object
        properties:
          explorerId: { type: string }
          friendId: { type: string }
          at: { type: string, format: date-time }
    BeatReacted:
      payload:
        type: object
        properties:
          beatId: { type: string }
          explorerId: { type: string }
          kind: { type: string, enum: [like, bolt] }
          at: { type: string, format: date-time }
    NotificationRaised:
      payload:
        type: object
        properties:
          notificationId: { type: string }
          recipientId: { type: string }
          kind:
            type: string
            enum: [STREAK_REMINDER, MILESTONE_REACHED, PROVINCE_UNLOCKED, FRIEND_ADDED, BEAT_REACTED, FRIEND_BEAT, PLACE_NEARBY]
          raisedAt: { type: string, format: date-time }
