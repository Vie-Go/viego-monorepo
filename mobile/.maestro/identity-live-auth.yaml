# Maestro E2E — identity-live-auth (T051, US4 independent test)
# Sign in with email code → land in app → change a preference → simulate reinstall (clearState) →
# sign in again → same account/handle/preferences survive. Proves FR-017 (no mock/local fallback)
# and the US4 independent test from spec.md end-to-end against the real backend.
#
# NOTE: the verification code is generated per request (research R3) and can't be hard-coded here
# — point EMAIL_CHALLENGE_SENDER at a test double with a fixed/predictable code, or substitute the
# real one read from the backend console log before each `inputText` below.
appId: com.viego.mobile
---
- clearState
- launchApp

# Language + sign-in (email code) — first "install"
- assertVisible: "Continue"
- tapOn: "Continue"
- tapOn: "New to VieGo?"
- tapOn:
    id: "Email"
- inputText: "e2e-identity@viego.app"
- tapOn: "Send code"
- assertVisible: "Check your email"
- tapOn:
    id: "Verification code"
- inputText: "123456" # replace with the real code sent to e2e-identity@viego.app
- tapOn: "Verify & continue"

# Onboarding → main
- tapOn: "Next"
- tapOn: "Next"
- tapOn: "Bắt đầu — Get started"
- assertVisible: "You’re all set"

# Change a preference (Profile tab isn't in the bottom nav yet — this flow assumes a route to it
# exists by the time it runs; update the tapOn target once Profile is reachable from main).
# - tapOn: "Profile"
# - tapOn: "Toggle theme"
# - assertVisible: "Theme: dark"

# Simulate reinstall: clear all on-device state (secure-store tokens + AsyncStorage), including
# the session — the account itself must survive server-side.
- clearState
- launchApp

# Sign in again with the SAME identity
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Welcome back"
- tapOn:
    id: "Email"
- inputText: "e2e-identity@viego.app"
- tapOn: "Send code"
- assertVisible: "Check your email"
- tapOn:
    id: "Verification code"
- inputText: "123456" # replace with the real code sent to e2e-identity@viego.app
- tapOn: "Verify & continue"

# Same account, same handle/preferences — Onboarding is skipped (returning Explorer) and the
# preference changed above (once wired) should still read back as "dark".
- assertVisible: "You’re all set"
- assertNotVisible: "Next"
