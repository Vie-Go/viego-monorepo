# Maestro E2E — returning-Explorer sign-in journey (T069)
# login (passwordless email code) → main, with Onboarding skipped. Assumes the account from
# first-launch.yaml already exists (real backend, not the removed mock repository — FR-017).
#
# NOTE: see first-launch.yaml's note — the verification code must come from the real backend
# response for this run, not a hard-coded value.
appId: com.viego.mobile
---
- launchApp

# If a session is still active this lands on main; this flow targets the Log in screen, so it
# assumes a signed-out state (e.g. after first-launch.yaml + a sign-out, or a fresh relaunch
# where the guard shows Log in because language is chosen but session is signed-out).
- assertVisible: "Welcome back"

# US3 — Log in with the returning account (email code, no password)
- tapOn:
    id: "Email"
- inputText: "mai.e2e@viego.app"
- tapOn: "Send code"
- assertVisible: "Check your email"
- tapOn:
    id: "Verification code"
- inputText: "123456" # replace with the real code sent to mai.e2e@viego.app
- tapOn: "Verify & continue"

# Lands directly on main — Onboarding is skipped for a returning Explorer.
- assertVisible: "You’re all set"
- assertNotVisible: "Next"
