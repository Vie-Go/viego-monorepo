services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: viego
      POSTGRES_USER: viego
      POSTGRES_PASSWORD: viego
    ports:
      - "5432:5432"
    volumes:
      - viego-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viego -d viego"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  viego-pgdata:
