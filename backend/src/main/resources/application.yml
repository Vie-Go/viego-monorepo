spring:
  application:
    name: viego-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/viego}
    username: ${DB_USERNAME:viego}
    password: ${DB_PASSWORD:viego}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    # Schema-per-module migration locations. Empty in Phase 0 — the app boots with zero migrations.
    fail-on-missing-locations: false
    locations:
      - classpath:db/migration/identity
      - classpath:db/migration/exploration
      - classpath:db/migration/engagement
      - classpath:db/migration/content
      - classpath:db/migration/social
      - classpath:db/migration/notification
      - classpath:db/migration/public

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Build version surfaced by GET /api/v1/status (filtered from the Maven project version at build time).
viego:
  version: @project.version@
  security:
    # Dev-only fixed value — never a real secret in this file (NFR-SEC-03). Must be at least 256
    # bits for HS256; overridden by a real secret in every non-local environment.
    jwt-signing-secret: ${JWT_SIGNING_SECRET:dev-only-jwt-signing-secret-change-me-0123456789abcdef}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
  google:
    oauth-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  email:
    challenge-sender: ${EMAIL_CHALLENGE_SENDER:console}
