name: mobile

# Path-scoped: mobile changes and shared contracts only. A backend-only change never
# triggers this pipeline; a contracts/** change triggers both.
on:
  push:
    branches: [main]
    paths: ['mobile/**', 'contracts/**', '.github/workflows/mobile.yml']
  pull_request:
    paths: ['mobile/**', 'contracts/**', '.github/workflows/mobile.yml']

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present -- --watchAll=false

      # Expo/EAS build validation. Real store builds run via `eas build` with EAS_TOKEN.
      - name: Export (build validation)
        run: npx expo export --platform all
